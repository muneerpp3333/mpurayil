services:
  db:
    image: postgres:16-alpine
    container_name: mpurayil-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mpurayil
      POSTGRES_PASSWORD: mpurayil_dev
      POSTGRES_DB: mpurayil
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
